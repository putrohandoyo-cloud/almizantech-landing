<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mizan Tech | Sovereign OS</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Load Babel (Untuk membaca kode React di dalam HTML biasa) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Load library grafik Recharts -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

    <style>
        body { margin: 0; background-color: #020617; } /* slate-950 */
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans selection:bg-emerald-500/30">
    
    <!-- Di sinilah aplikasi React akan dirender -->
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. DESTRUCTURING LIBRARY ---
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

        // --- 2. IKON SVG MANUAL (Pengganti Lucide) ---
        const Leaf = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const Globe = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Activity = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const ShieldCheck = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const Cpu = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/><path d="M20 9h3"/><path d="M20 14h3"/><path d="M1 9h3"/><path d="M1 14h3"/></svg>;
        const ShoppingCart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const CheckCircle2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const AlertTriangle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const Zap = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14H4z"/></svg>;

        // --- 3. DATA SIMULASI ---
        const socData = [
          { day: 'Day 0', carbon: 0, matrix: 100 },
          { day: 'Day 7', carbon: 5, matrix: 95 },
          { day: 'Day 14', carbon: 15, matrix: 85 },
          { day: 'Day 21', carbon: 35, matrix: 65 },
          { day: 'Day 30', carbon: 60, matrix: 40 },
          { day: 'Day 45', carbon: 85, matrix: 15 },
          { day: 'Day 60', carbon: 98, matrix: 2 },
        ];

        const generateMockHash = () => {
          const chars = '0123456789abcdef';
          let hash = '';
          for (let i = 0; i < 64; i++) {
            hash += chars[Math.floor(Math.random() * chars.length)];
          }
          return hash;
        };

        function App() {
          const [carbonSequestered, setCarbonSequestered] = useState(12450.5);
          const [plasticSaved, setPlasticSaved] = useState(3120);
          const [hashes, setHashes] = useState([]);

          useEffect(() => {
            const initialHashes = Array(5).fill(null).map(() => ({
              time: new Date(Date.now() - Math.random() * 10000).toISOString().split('T')[1].substring(0, 8),
              hash: generateMockHash(),
              node: `NODE-0${Math.floor(Math.random() * 3) + 1}`
            }));
            setHashes(initialHashes);

            const interval = setInterval(() => {
              setCarbonSequestered(prev => prev + (Math.random() * 0.5));
              setPlasticSaved(prev => prev + (Math.random() * 0.2));
              
              const newHash = {
                time: new Date().toISOString().split('T')[1].substring(0, 8),
                hash: generateMockHash(),
                node: `NODE-0${Math.floor(Math.random() * 3) + 1}`
              };
              
              setHashes(prev => [newHash, ...prev].slice(0, 8));
            }, 3000);

            return () => clearInterval(interval);
          }, []);

          return (
            <div>
              <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                      <Leaf className="text-slate-950 w-6 h-6" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white tracking-tight">AL-MIZAN <span className="text-emerald-400">TECH</span></h1>
                      <p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Sovereign Ecosystem</p>
                    </div>
                  </div>
                  <nav className="hidden md:flex gap-8 text-sm font-medium">
                    <a href="#dmrv" className="hover:text-emerald-400 transition-colors">dMRV Ledger</a>
                    <a href="#farmer" className="hover:text-emerald-400 transition-colors">Farmer Portal</a>
                  </nav>
                  <button className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/50 px-5 py-2 rounded-full text-sm font-semibold hover:bg-emerald-500 hover:text-slate-950 transition-all duration-300">
                    Investor Login
                  </button>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-6 py-12 space-y-24">
                <section className="text-center space-y-8 pt-12 pb-16">
                  <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm font-medium mb-4">
                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Sovereign OS V4 is LIVE in Sumbing Valley
                  </div>
                  <h2 className="text-5xl md:text-7xl font-extrabold text-white tracking-tight leading-tight">
                    Autonomous <br className="hidden md:block"/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                      Agri-Climate Infrastructure
                    </span>
                  </h2>
                  <p className="max-w-2xl mx-auto text-lg text-slate-400 leading-relaxed">
                    Mengeksekusi Sekuestrasi Karbon Organik Tanah (SOC) yang Dapat Diverifikasi Kriptografi Melalui Rekayasa Material Matryoshka & Komputasi Tepi (Edge Computing).
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-12">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-2xl relative overflow-hidden group">
                      <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <Globe className="w-24 h-24 text-emerald-500" />
                      </div>
                      <p className="text-sm text-slate-400 font-medium uppercase tracking-wider mb-2">Total Carbon Sequestered</p>
                      <p className="text-4xl font-bold text-white font-mono">
                        {carbonSequestered.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span className="text-xl text-emerald-500">Ton CO₂eq</span>
                      </p>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-2xl relative overflow-hidden group">
                      <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <Leaf className="w-24 h-24 text-emerald-500" />
                      </div>
                      <p className="text-sm text-slate-400 font-medium uppercase tracking-wider mb-2">Single-Use Plastics Avoided</p>
                      <p className="text-4xl font-bold text-white font-mono">
                        {Math.floor(plasticSaved).toLocaleString()} <span className="text-xl text-emerald-500">Kg</span>
                      </p>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-2xl relative overflow-hidden group">
                      <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <Activity className="w-24 h-24 text-emerald-500" />
                      </div>
                      <p className="text-sm text-slate-400 font-medium uppercase tracking-wider mb-2">Global Sensor Uptime</p>
                      <p className="text-4xl font-bold text-white font-mono">
                        99.98 <span className="text-xl text-emerald-500">%</span>
                      </p>
                    </div>
                  </div>
                </section>

                <section id="dmrv" className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                  <div className="space-y-6">
                    <div className="flex items-center gap-3 text-emerald-400">
                      <ShieldCheck className="w-6 h-6" />
                      <h3 className="text-sm font-bold uppercase tracking-widest">Institutional Vault</h3>
                    </div>
                    <h2 className="text-3xl md:text-4xl font-bold text-white">The dMRV Immutable Ledger</h2>
                    <p className="text-slate-400 leading-relaxed">
                      Setiap peristiwa biokimia dan termodinamika di lahan (seperti gelasi ionotropik dan detonasi enzimatik) dikunci dengan sidik jari kriptografi (SHA-256) di tingkat perangkat keras. Sistem ini mustahil dimanipulasi, menyajikan bukti nol-rahasia (Zero-Knowledge Proof) bagi auditor karbon global.
                    </p>
                    
                    <div className="bg-black border border-slate-800 rounded-xl p-4 font-mono text-xs overflow-hidden h-64 relative shadow-[inset_0_0_20px_rgba(0,0,0,1)]">
                      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent"></div>
                      <div className="flex justify-between items-center border-b border-slate-800 pb-2 mb-3">
                        <span className="text-slate-500">AMZ SOVEREIGN OS // LIVE STREAM</span>
                        <span className="text-emerald-500 flex items-center gap-2"><span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SECURE</span>
                      </div>
                      <div className="space-y-2">
                        {hashes.map((item, idx) => (
                          <div key={idx} className="flex gap-3 text-emerald-500/80 hover:text-emerald-400 transition-colors opacity-90">
                            <span className="text-slate-600">[{item.time}]</span>
                            <span className="text-cyan-500 w-16">{item.node}</span>
                            <span className="truncate">{item.hash}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                     <div className="flex justify-between items-center mb-6">
                        <div>
                          <h4 className="text-white font-bold">SOC Sequestration vs Matrix Degradation</h4>
                          <p className="text-xs text-slate-500">Thermodynamic Proof of Concept (Sumbing Site)</p>
                        </div>
                        <Cpu className="text-slate-600 w-6 h-6" />
                     </div>
                     <div className="h-64">
                       <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={socData}>
                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                            <XAxis dataKey="day" stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                            <YAxis stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                            <Tooltip 
                              contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '8px' }}
                              itemStyle={{ fontSize: '14px' }}
                            />
                            <Line type="monotone" dataKey="carbon" name="SOC Level (%)" stroke="#10b981" strokeWidth={3} dot={{ r: 4, fill: '#10b981' }} />
                            <Line type="monotone" dataKey="matrix" name="Matrix Integrity (%)" stroke="#f43f5e" strokeWidth={3} dot={{ r: 4, fill: '#f43f5e' }} />
                          </LineChart>
                        </ResponsiveContainer>
                     </div>
                  </div>
                </section>

                <section id="farmer" className="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-3xl p-8 md:p-16 text-center max-w-4xl mx-auto relative overflow-hidden">
                   <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-32 bg-emerald-500/20 blur-[100px] pointer-events-none"></div>
                   
                   <h2 className="text-3xl font-bold text-white mb-4">Farmer Portal: GSE Index Lite</h2>
                   <p className="text-slate-400 mb-12">Antarmuka sederhana yang menerjemahkan kompleksitas termodinamika menjadi aksi agronomis yang mudah dipahami petani.</p>

                   <div className="grid md:grid-cols-2 gap-8 text-left">
                      <div className="bg-slate-950 border border-emerald-500/30 p-6 rounded-2xl shadow-[0_0_30px_rgba(16,185,129,0.05)] relative">
                         <div className="absolute top-4 right-4 text-emerald-500"><CheckCircle2 className="w-6 h-6"/></div>
                         <h4 className="text-slate-300 font-medium mb-1">Blok Utara - Baris 14</h4>
                         <p className="text-xs text-slate-500 mb-6">Update: 2 Menit yang lalu</p>
                         
                         <div className="text-6xl font-black text-emerald-400 mb-2">92</div>
                         <p className="text-sm text-emerald-500 font-medium">STABILITAS IDEAL</p>
                         
                         <p className="text-xs text-slate-400 mt-4 px-4">Bakteri Bacillus aktif melindungi matriks akar. Stabilitas termodinamika terjaga.</p>
                      </div>

                      <div className="bg-slate-950 border border-rose-500/30 p-6 rounded-2xl shadow-[0_0_30px_rgba(244,63,94,0.05)] flex flex-col justify-between relative">
                         <div className="absolute top-4 right-4 text-rose-500"><AlertTriangle className="w-6 h-6"/></div>
                         <div>
                          <h4 className="text-slate-300 font-medium mb-1">Blok Selatan - Baris 02</h4>
                          <p className="text-xs text-slate-500 mb-6">Update: Baru saja</p>
                          
                          <div className="text-6xl font-black text-rose-400 mb-2">41</div>
                          <p className="text-sm text-rose-500 font-medium uppercase">Kritis: Nutrisi Tercuci</p>
                          
                          <p className="text-xs text-slate-400 mt-4 px-4">Masa aktif Bio-Polybag hampir habis. Matriks hancur sebelum waktunya.</p>
                         </div>
                         
                         <button className="mt-6 w-full py-3 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white font-bold rounded-xl flex items-center justify-center gap-2 hover:from-emerald-500 hover:to-emerald-400 transition-all shadow-[0_4px_15px_rgba(16,185,129,0.3)]">
                           <ShoppingCart className="w-4 h-4" /> Restock Bio-Polybag
                         </button>
                      </div>
                   </div>
                </section>
              </main>

              <footer className="border-t border-slate-800 py-16 text-center text-slate-500 text-sm relative overflow-hidden">
                {/* Latar belakang efek cahaya hijau samar di area footer */}
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent"></div>
                
                {/* Blok Kontak Email */}
                <div className="mb-10">
                  <p className="text-slate-400 mb-3 text-xs uppercase tracking-widest font-semibold">Execute Inquiry / Grant Coordination</p>
                  <a href="mailto:steward@almizantech.com" className="inline-block text-emerald-400 hover:text-emerald-300 font-mono text-lg transition-all duration-300 border border-emerald-500/30 px-8 py-3 rounded-full bg-emerald-500/5 hover:bg-emerald-500/20 hover:shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                    steward@almizantech.com
                  </a>
                </div>

                <p>&copy; 2026 PT Al-Mizan Teknologi Inovatif. All rights reserved.</p>
                <p className="mt-2 text-xs">Proprietary Technology Protected by DJKI & WIPO (PCT/ID2026/000249)</p>
              </footer>
            </div>
          );
        }

        // --- 5. RENDER KE DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
