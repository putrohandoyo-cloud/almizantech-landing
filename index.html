<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mizan Tech | Sovereign OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="text-slate-300">
    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <span class="text-slate-950 font-bold">AMZ</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">AL-MIZAN <span class="text-emerald-400">TECH</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Sovereign OS V4</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Hero Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase mb-2">Total Carbon Sequestered</p>
                <p id="carbon-ticker" class="text-3xl font-bold text-white font-mono">12,450.50 <span class="text-emerald-500 text-lg">Ton CO₂eq</span></p>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase mb-2">Plastics Avoided</p>
                <p id="plastic-ticker" class="text-3xl font-bold text-white font-mono">3,120 <span class="text-emerald-500 text-lg">Kg</span></p>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase mb-2">Sensor Uptime</p>
                <p class="text-3xl font-bold text-white font-mono">99.98 <span class="text-emerald-500 text-lg">%</span></p>
            </div>
        </div>

        <!-- Terminal -->
        <div class="bg-black border border-slate-800 rounded-xl p-6 font-mono text-xs overflow-hidden shadow-2xl">
            <div class="flex items-center gap-2 text-emerald-500 mb-4 border-b border-slate-800 pb-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span>AMZ SOVEREIGN OS // ATOMIC WITNESS LEDGER</span>
            </div>
            <div id="terminal-logs" class="space-y-2 text-emerald-500/70 h-48 overflow-y-hidden">
                <!-- Logs will be injected here -->
            </div>
        </div>
    </main>

    <footer class="text-center py-12 border-t border-slate-800 mt-12">
        <a href="mailto:steward@almizantech.com" class="text-emerald-400 border border-emerald-500/30 px-6 py-2 rounded-full bg-emerald-500/5 hover:bg-emerald-500/20 font-mono transition-all">
            steward@almizantech.com
        </a>
    </footer>

    <script>
        // Ticker Logic
        setInterval(() => {
            let carbon = parseFloat(document.getElementById('carbon-ticker').innerText);
            document.getElementById('carbon-ticker').innerHTML = (carbon + 0.01).toFixed(2) + ' <span class="text-emerald-500 text-lg">Ton CO₂eq</span>';
        }, 2000);

        // Terminal Log Logic
        const logs = document.getElementById('terminal-logs');
        function addLog() {
            const hash = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] NODE-06 HASH: ${hash.substring(0, 32)}... <span class="text-emerald-400">VERIFIED</span>`;
            logs.prepend(div);
            if (logs.children.length > 8) logs.removeChild(logs.lastChild);
        }
        setInterval(addLog, 2000);
        addLog(); addLog(); addLog();
    </script>
</body>
</html>
